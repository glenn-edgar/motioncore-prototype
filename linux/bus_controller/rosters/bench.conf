# Benchmark/soak roster: single slave, AGGRESSIVE 5 ms poll cadence so the bus is
# pushed as fast as the wire allows (vs. the 500 ms bring-up cadence). max_misses
# bumped to 20 so a momentary slip under load doesn't false-mark the slave DOWN.
poll  5 20 2
slave 1 0x5E589100 0x02    # ENABLED, UDP
