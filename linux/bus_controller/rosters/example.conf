# Example Layer-2 authoritative bus roster.
# In production one of these lives per dongle, keyed by dongle id.
#
#   poll  <period_ms> <max_misses> <tcp_retries>
#   slave <addr> <class_id> <flags>     # flags: bit0=TCP, bit1=ENABLED

poll  500 3 2

slave 10 0x5E589100 0x03    # a slave, TCP + enabled
slave 11 0x5E589100 0x02    # a slave, UDP + enabled
slave 20 0x5E589000 0x03    # another node, TCP + enabled
