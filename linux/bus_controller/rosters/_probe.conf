# _probe.conf — NO-slaves roster for the bus_supervisor startup UID probe.
#
# The supervisor opens each /dev/ttyACM* with this roster just long enough to
# read the controller's REGISTER chip_uid (for UID-based device auto-assignment),
# then closes it. Having zero slaves guarantees the probe never pushes a real
# slave roster to a (possibly wrong) bus controller.
poll 500 3 2
