# Bus-2 bench roster: a single slave at RS-485 addr 2 (instance 2, class
# 0x5E589100). Mirrors bench.conf (addr 1) for the second bus segment behind a
# second bus controller. 5 ms aggressive poll, max_misses 20 — same as bench.conf.
# Baked into the bus_supervisor image at /app/rosters/bus2.conf (build.sh stages
# all linux/bus_controller/rosters/*.conf).
poll  5 20 2
slave 2 0x5E589100 0x02    # ENABLED, UDP
